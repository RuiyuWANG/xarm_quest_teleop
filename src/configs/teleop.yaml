# teleop.yaml  (mappings)
teleop:
  # which controller drives the robot: "left" or "right"
  hand: "right"

  # deadman (enable motion) button field name from your custom msg
  deadman_button: "button_upper"

  # optional secondary button (if you want it later, can ignore)
  # mode_button: "button_lower"

  # gripper control input field name from your custom msg (0..1)
  gripper_axis: "press_index"

  # map gripper_axis 0..1 -> xArm gripper pulse range
  gripper_pulse_open: -100
  gripper_pulse_close: 850

  # if you use controller twist for EE velocity, scale it here
  # (these are just scalar multipliers applied in python)
  ee_twist_scale:
    linear: 1.0
    angular: 1.0

  # optional: clamp twist to safe maxima
  ee_twist_max:
    linear: 0.25     # m/s
    angular: 1.5     # rad/s
